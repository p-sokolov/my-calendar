services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      prometheus:
        condition: service_started
      clickhouse:
        condition: service_healthy

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"

  clickhouse:
    image: clickhouse/clickhouse-server:latest  
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: calendar
      CLICKHOUSE_USER: calendar
      CLICKHOUSE_PASSWORD: calendar123